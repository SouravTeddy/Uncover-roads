<h2>How should messages cycle?</h2>
<p class="subtitle">Both options use the center card from Option A. Pick the transition feel you prefer.</p>

<div class="split" style="gap:24px;align-items:flex-start;">

  <!-- Option A: Fade swap -->
  <div class="mockup">
    <div class="mockup-header">A — Fade swap</div>
    <div class="mockup-body" style="background:#0f141e;height:220px;position:relative;overflow:hidden;border-radius:0 0 10px 10px;">
      <div style="position:absolute;inset:0;background:linear-gradient(135deg,#1a2535 0%,#141e2e 50%,#1a2535 100%);"></div>
      <svg style="position:absolute;inset:0;width:100%;height:100%;opacity:0.15" viewBox="0 0 300 220">
        <line x1="0" y1="60" x2="300" y2="60" stroke="#8899aa" stroke-width="2"/>
        <line x1="0" y1="140" x2="300" y2="140" stroke="#8899aa" stroke-width="1"/>
        <line x1="80" y1="0" x2="80" y2="220" stroke="#8899aa" stroke-width="2"/>
        <line x1="200" y1="0" x2="200" y2="220" stroke="#8899aa" stroke-width="1"/>
      </svg>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(15,20,30,0.92);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:18px 24px;text-align:center;min-width:170px;box-shadow:0 8px 32px rgba(0,0,0,0.6);">
        <div id="spinA" style="width:32px;height:32px;border-radius:50%;border:3px solid rgba(59,130,246,0.2);border-top-color:#3b82f6;margin:0 auto 10px;"></div>
        <p id="msgA" style="color:#fff;font-size:13px;font-weight:600;margin:0 0 2px;transition:opacity 0.4s;">Sketching Roads...</p>
        <p style="color:rgba(255,255,255,0.3);font-size:10px;margin:0;">hang tight</p>
      </div>
    </div>
  </div>

  <!-- Option B: Slide up swap -->
  <div class="mockup">
    <div class="mockup-header">B — Slide up</div>
    <div class="mockup-body" style="background:#0f141e;height:220px;position:relative;overflow:hidden;border-radius:0 0 10px 10px;">
      <div style="position:absolute;inset:0;background:linear-gradient(135deg,#1a2535 0%,#141e2e 50%,#1a2535 100%);"></div>
      <svg style="position:absolute;inset:0;width:100%;height:100%;opacity:0.15" viewBox="0 0 300 220">
        <line x1="0" y1="60" x2="300" y2="60" stroke="#8899aa" stroke-width="2"/>
        <line x1="0" y1="140" x2="300" y2="140" stroke="#8899aa" stroke-width="1"/>
        <line x1="80" y1="0" x2="80" y2="220" stroke="#8899aa" stroke-width="2"/>
        <line x1="200" y1="0" x2="200" y2="220" stroke="#8899aa" stroke-width="1"/>
      </svg>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(15,20,30,0.92);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:18px 24px;text-align:center;min-width:170px;box-shadow:0 8px 32px rgba(0,0,0,0.6);overflow:hidden;">
        <div id="spinB" style="width:32px;height:32px;border-radius:50%;border:3px solid rgba(59,130,246,0.2);border-top-color:#3b82f6;margin:0 auto 10px;"></div>
        <div style="height:20px;overflow:hidden;position:relative;">
          <p id="msgB" style="color:#fff;font-size:13px;font-weight:600;margin:0;position:absolute;width:100%;text-align:center;transition:transform 0.35s cubic-bezier(0.4,0,0.2,1),opacity 0.35s;">Cooking hotspots...</p>
        </div>
        <p style="color:rgba(255,255,255,0.3);font-size:10px;margin:4px 0 0;">hang tight</p>
      </div>
    </div>
  </div>

</div>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
#spinA, #spinB { animation: spin 1s linear infinite; }

</style>

<script>
const msgs = [
  "Sketching Roads...",
  "Cooking hotspots...",
  "Loading something...",
  "Finding hidden gems...",
  "Waking up the city...",
  "Sniffing out cafés...",
];
let idx = 0;

// Fade version
function cycleA() {
  const el = document.getElementById('msgA');
  el.style.opacity = '0';
  setTimeout(() => {
    idx = (idx + 1) % msgs.length;
    el.textContent = msgs[idx];
    el.style.opacity = '1';
  }, 400);
}
setInterval(cycleA, 1800);

// Slide up version
let idxB = 1;
function cycleB() {
  const el = document.getElementById('msgB');
  el.style.transform = 'translateY(-120%)';
  el.style.opacity = '0';
  setTimeout(() => {
    idxB = (idxB + 1) % msgs.length;
    el.textContent = msgs[idxB];
    el.style.transition = 'none';
    el.style.transform = 'translateY(120%)';
    el.style.opacity = '0';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      el.style.transition = 'transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s';
      el.style.transform = 'translateY(0)';
      el.style.opacity = '1';
    }));
  }, 350);
}
setInterval(cycleB, 1800);
</script>
